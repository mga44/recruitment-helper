services:
  mongodb:
    image: mongo:latest
    container_name: recruitment_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: recruitment_backend
    environment:
      - MONGO_URI=mongodb://mongodb:27017/recruitment
      - PORT=5000
      # Backend port 5000 isn't published to the host, so the OAuth callback
      # must go through nginx on 8080 instead of hitting 5000 directly.
      # These override backend/.env (dotenv won't clobber vars already set).
      - GOOGLE_REDIRECT_URI=http://localhost:8080/api/auth/google/callback
      - FRONTEND_URL=http://localhost:8080
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: recruitment_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
