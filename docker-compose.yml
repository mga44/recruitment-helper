services:
  mongodb:
    image: mongo:latest
    container_name: recruitment_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: recruitment_backend
    environment:
      - MONGO_URI=mongodb://mongodb:27017/recruitment
      - PORT=5000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: recruitment_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
